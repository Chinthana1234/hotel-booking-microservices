version: '3.8'

services:
  user-service:
    build: ./user-service
    ports:
      - "5001:5001"
    env_file:
      - ./user-service/.env

  room-service:
    build: ./room-service
    ports:
      - "5002:5002"
    env_file:
      - ./room-service/.env

  booking-service:
    build: ./booking-service
    ports:
      - "5003:5003"
    env_file:
      - ./booking-service/.env

  payment-service:
    build: ./payment-service
    ports:
      - "5004:5004"
    env_file:
      - ./payment-service/.env

  review-service:
    build: ./review-service
    ports:
      - "5005:5005"
    env_file:
      - ./review-service/.env

  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    env_file:
      - ./api-gateway/.env
    environment:
      # These override the .env file so the Gateway can route to the Docker container names
      - USER_SERVICE_URL=http://user-service:5001
      - ROOM_SERVICE_URL=http://room-service:5002
      - BOOKING_SERVICE_URL=http://booking-service:5003
      - PAYMENT_SERVICE_URL=http://payment-service:5004
      - REVIEW_SERVICE_URL=http://review-service:5005
    depends_on:
      - user-service
      - room-service
      - booking-service
      - payment-service
      - review-service

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
